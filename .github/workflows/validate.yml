name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout skill repo
        uses: actions/checkout@v4

      - name: Checkout SQLDelight docs source
        uses: actions/checkout@v4
        with:
          repository: sqldelight/sqldelight
          path: sqldelight-upstream

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: python -m pip install PyYAML

      - name: Validate npm package contents
        run: npm pack --dry-run

      - name: Validate SKILL.md frontmatter
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          import yaml

          path = Path("skills/sqldelight/SKILL.md")
          content = path.read_text()
          match = re.match(r"^---\n(.*?)\n---", content, re.S)
          if not match:
              raise SystemExit("SKILL.md is missing YAML frontmatter")
          data = yaml.safe_load(match.group(1))
          if data.get("name") != "sqldelight":
              raise SystemExit("SKILL.md name must be sqldelight")
          description = data.get("description", "")
          if not isinstance(description, str) or not description.strip():
              raise SystemExit("SKILL.md description must be a non-empty string")
          print("frontmatter ok")
          PY

      - name: Validate agents metadata
        run: |
          python - <<'PY'
          from pathlib import Path
          text = Path("skills/sqldelight/agents/openai.yaml").read_text()
          if 'default_prompt: "Use $sqldelight ' not in text:
              raise SystemExit("default_prompt must mention $sqldelight")
          print("agents metadata ok")
          PY

      - name: Validate references
        run: |
          python skills/sqldelight/scripts/validate_refs.py \
            --repo-root sqldelight-upstream \
            --skill-dir skills/sqldelight

      - name: Validate npx installer
        run: |
          node bin/install.js --dest /tmp/codex-skills-test
          test -f /tmp/codex-skills-test/sqldelight/SKILL.md
